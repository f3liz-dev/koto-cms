# Container Image Vulnerability Scanning
# Add this stage to build_spec.yaml after image push

steps:
  # ... existing build steps ...

  - type: Command
    name: "Scan Container Image"
    timeoutInSeconds: 300
    command: |
      echo "Scanning container image for vulnerabilities..."
      
      # Install Trivy scanner
      curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
      
      # Scan the pushed image
      IMAGE_URL="${OCI_REGION}.ocir.io/${OCI_NAMESPACE}/${PROJECT_NAME}:${DOCKER_IMAGE_TAG}"
      
      trivy image \
        --severity HIGH,CRITICAL \
        --exit-code 1 \
        --no-progress \
        --format json \
        --output trivy-report.json \
        "${IMAGE_URL}"
      
      # If scan fails (exit code 1), the build will fail
      # To allow builds with vulnerabilities, remove --exit-code 1
      
      echo "Vulnerability scan completed"
    onFailure:
      - type: Command
        command: |
          echo "⚠️  Container image has HIGH or CRITICAL vulnerabilities!"
          echo "Review trivy-report.json for details"
          cat trivy-report.json
        timeoutInSeconds: 40

outputArtifacts:
  - name: trivy-report
    type: BINARY
    location: trivy-report.json

# To enable scanning:
# 1. Add this step to infrastructure/oci-devops/build_spec.yaml
# 2. Configure artifact output in DevOps Build Pipeline
# 3. Set --exit-code 0 to allow builds with vulnerabilities (not recommended)
