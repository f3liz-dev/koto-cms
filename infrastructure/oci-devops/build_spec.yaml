version: 0.1
component: build
timeoutInSeconds: 1200
shell: bash

env:
  exportedVariables:
    - DOCKER_IMAGE_TAG
    - DOCKER_REGISTRY
    - DOCKER_REPO

steps:
  - type: Command
    name: "Install Node.js"
    command: |
      curl -fsSL https://rpm.nodesource.com/setup_22.x | bash -
      yum install -y nodejs

  - type: Command
    name: "Build Frontend"
    command: |
      npm ci
      npm run build
      echo "✓ Frontend built successfully"

  - type: Command
    name: "Upload Frontend to Object Storage"
    command: |
      if [ -z "${OCI_BUCKET_NAME}" ]; then
        echo "ERROR: OCI_BUCKET_NAME must be defined as a build pipeline parameter"
        exit 1
      fi
      find public/ -type f | while read -r f; do
        case "${f##*.}" in
          html)     mime="text/html" ;;
          css)      mime="text/css" ;;
          js)       mime="application/javascript" ;;
          json)     mime="application/json" ;;
          png)      mime="image/png" ;;
          jpg|jpeg) mime="image/jpeg" ;;
          svg)      mime="image/svg+xml" ;;
          woff2)    mime="font/woff2" ;;
          *)        mime="application/octet-stream" ;;
        esac
        oci os object put \
          --bucket-name "${OCI_BUCKET_NAME}" \
          --file "$f" \
          --name "${f#public/}" \
          --content-type "$mime" \
          --auth resource_principal \
          --force
      done
      echo "✓ Frontend uploaded to Object Storage"

  - type: Command
    name: "Set Docker Image Tag"
    command: |
      # OCI_REGION and OCI_NAMESPACE must be set as build pipeline parameters
      if [ -z "${OCI_REGION}" ] || [ -z "${OCI_NAMESPACE}" ]; then
        echo "ERROR: OCI_REGION and OCI_NAMESPACE must be defined as build pipeline parameters"
        exit 1
      fi
      export DOCKER_REGISTRY="${OCI_REGION}.ocir.io"
      export DOCKER_REPO="${OCI_NAMESPACE}/koto-cms"
      export DOCKER_IMAGE_TAG=$(echo "${OCI_BUILD_RUN_ID:-latest}" | awk -F. '{print tolower($NF)}')
      echo "Image tag: ${DOCKER_IMAGE_TAG}"

  - type: Command
    name: "Build Backend Docker Image"
    command: |
      docker build \
        -f Dockerfile.backend \
        -t ${DOCKER_REGISTRY}/${DOCKER_REPO}:${DOCKER_IMAGE_TAG} \
        -t ${DOCKER_REGISTRY}/${DOCKER_REPO}:latest \
        .

  - type: Command
    name: "Push to OCI Container Registry"
    command: |
      # Use resource principal authentication (no auth token needed)
      # Dynamic Group policy grants push access to OCIR
      
      # Get auth token from resource principal
      TOKEN=$(oci iam auth-token create --description "DevOps Build" --auth resource_principal 2>/dev/null || echo "")
      
      if [ -z "$TOKEN" ]; then
        # Fallback: Use instance principal to get temporary token
        echo "Using resource principal for OCIR authentication..."
        oci artifacts container image list \
          --compartment-id ${OCI_COMPARTMENT_ID} \
          --auth resource_principal > /dev/null
        
        # Docker login with resource principal
        echo "Authenticating to OCIR..."
        TOKEN=$(oci session authenticate --auth resource_principal --region ${OCI_REGION} 2>&1 | grep -o 'token.*' || echo "resource_principal")
      fi
      
      # Push images
      docker push ${DOCKER_REGISTRY}/${DOCKER_REPO}:${DOCKER_IMAGE_TAG}
      docker push ${DOCKER_REGISTRY}/${DOCKER_REPO}:latest
      
      echo "✓ Image pushed: ${DOCKER_REGISTRY}/${DOCKER_REPO}:${DOCKER_IMAGE_TAG}"

outputArtifacts:
  - name: docker_image
    type: DOCKER_IMAGE
    location: ${DOCKER_REGISTRY}/${DOCKER_REPO}:${DOCKER_IMAGE_TAG}
