title: "Koto - OCI Resource Manager Stack"
description: "Serverless CMS with Fediverse authentication"
schemaVersion: 1.1.0
version: "1.0.0"
locale: "ja"

variableGroups:
  - title: "必須設定"
    variables:
      - region
      - compartment_id
      - tenancy_ocid
      - subnet_id

  - title: "GitHub設定"
    variables:
      - github_repo
      - content_repo
      - github_bot_token
      - github_access_token
      - github_branch

  - title: "認証設定"
    variables:
      - session_secret
      - document_editors
      - miauth_callback_url
      - app_name

  - title: "詳細設定（オプション）"
    variables:
      - project_name

variables:
  region:
    type: oci:identity:region:name
    title: "リージョン"
    description: "デプロイ先のOCIリージョン"
    required: true

  compartment_id:
    type: oci:identity:compartment:id
    title: "コンパートメント"
    description: "リソースを作成するコンパートメント"
    required: true

  tenancy_ocid:
    type: oci:identity:tenancy:id
    title: "テナンシーOCID"
    description: "OCIテナンシーのOCID（自動入力）"
    required: true

  subnet_id:
    type: oci:core:subnet:id
    title: "サブネット"
    description: "Functions用のサブネット"
    required: true
    dependsOn:
      compartmentId: ${compartment_id}

  github_repo:
    type: string
    title: "DevOps用GitHubリポジトリ"
    description: "OCI DevOpsがミラーリングするリポジトリ（例: owner/repo）"
    required: true
    pattern: "^[a-zA-Z0-9_.-]+/[a-zA-Z0-9_.-]+$"

  content_repo:
    type: string
    title: "コンテンツ管理用GitHubリポジトリ"
    description: "記事を管理するリポジトリ（例: owner/content）"
    required: true
    pattern: "^[a-zA-Z0-9_.-]+/[a-zA-Z0-9_.-]+$"

  github_bot_token:
    type: password
    title: "GitHub Bot Token"
    description: "GitHub API用のPersonal Access Token"
    required: true

  github_access_token:
    type: password
    title: "GitHub Access Token"
    description: "リポジトリミラーリング用のPAT"
    required: true

  github_branch:
    type: string
    title: "デフォルトブランチ"
    description: "ベースブランチ名"
    default: "main"

  session_secret:
    type: password
    title: "セッション秘密鍵"
    description: "32文字以上のランダム文字列"
    required: true
    minLength: 32

  document_editors:
    type: string
    title: "許可するエディター"
    description: "カンマ区切りのFediverseハンドル (@user@instance)"
    required: true

  miauth_callback_url:
    type: string
    title: "MiAuthコールバックURL"
    description: "公開アクセス可能なコールバックURL"
    required: true
    pattern: "^https://.+/miauth/callback$"

  app_name:
    type: string
    title: "アプリケーション名"
    description: "MiAuth認証画面に表示される名前"
    default: "Koto"

  project_name:
    type: string
    title: "プロジェクト名"
    description: "リソース名のプレフィックス"
    default: "koto-cms"
    pattern: "^[a-z0-9-]+$"
