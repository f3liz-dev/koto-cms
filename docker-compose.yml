# docker-compose.yml — Local development
#
# Usage:
#   cp .env.example.elixir .env
#   docker compose up
#   npm run dev  # in separate terminal for frontend

version: "3.9"

services:
  cms:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PORT=3000
      - PHX_HOST=0.0.0.0
      - GITHUB_BOT_TOKEN=${GITHUB_BOT_TOKEN}
      - GITHUB_REPO=${GITHUB_REPO}
      - GITHUB_BRANCH=${GITHUB_BRANCH:-main}
      - SESSION_SECRET=${SESSION_SECRET}
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - SESSION_SIGNING_SALT=${SESSION_SIGNING_SALT}
      - SESSION_COOKIE_KEY=${SESSION_COOKIE_KEY:-_koto_cms_key}
      - SESSION_TTL_HOURS=${SESSION_TTL_HOURS:-8}
      - SESSION_TOKEN_VERSION=${SESSION_TOKEN_VERSION:-1}
      - DOCUMENT_EDITORS=${DOCUMENT_EDITORS}
      - MIAUTH_CALLBACK_URL=${MIAUTH_CALLBACK_URL:-http://localhost:3000/miauth/callback}
      - APP_NAME=${APP_NAME:-Koto}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
