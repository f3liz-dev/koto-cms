name = "koto-cms"
main = "./infrastructure/cloudflare-do/src/worker.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]
account_id = "1f8d93c6bccc8dfdf0404b08892a4613"

# Static assets: @cloudflare/vite-plugin populates `directory` automatically at
# build time using the client build output, so we only declare the binding here.
[assets]
binding = "ASSETS"
not_found_handling = "single-page-application"
# Worker runs first so dynamic routes (/miauth/callback, /api/*, /auth/*) are
# never intercepted by the Assets CDN cache.
run_worker_first = true

[[durable_objects.bindings]]
name = "KOTO_DO"
class_name = "KotoCmsDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["KotoCmsDO"]

# TENANTS is a JSON string keyed by "<owner>/<repo>", value = {
#   githubToken, sessionSecret, documentEditors, sessionTtlHours?,
#   sessionTokenVersion?, defaultBranch?, miauthCallbackUrl?, appName?
# }
# Use `wrangler secret put TENANTS` for production; this [vars] block is dev-only.
[vars]
# Dev-only placeholder. In production use `wrangler secret put TENANTS`.
# The `alice/my-docs` entry here is purely a smoke-test shape; replace before deploy.
# TENANTS = "{\"alice/my-docs\":{\"githubToken\":\"dummy\",\"sessionSecret\":\"test-secret-please-ignore-1234567890abcdef\",\"documentEditors\":\"@alice@example.social\",\"miauthCallbackUrl\":\"http://localhost:5173/miauth/callback\"}}"
DEFAULT_BRANCH = "main"
APP_NAME = "Koto"
