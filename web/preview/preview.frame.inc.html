<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color: #303331;
        padding: 16px;
        line-height: 1.6;
      }
      pre {
        background: #f4f4f1;
        padding: 10px;
        border-radius: 8px;
        overflow: auto;
      }
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }
      a {
        color: #3256a8;
      }
      img {
        max-width: 100%;
        height: auto;
      }
      table {
        border-collapse: collapse;
      }
      td,
      th {
        border: 1px solid #ddd;
        padding: 6px 8px;
      }
      .custom-block {
        margin: 16px 0;
        padding: 12px 16px;
        border-left: 4px solid;
        border-radius: 8px;
        background: #f7f8fa;
      }
      .custom-block-title {
        margin: 0 0 6px;
        font-size: 0.82rem;
        line-height: 1.2;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .custom-block.info {
        background: #eef4ff;
        border-color: #3b82f6;
      }
      .custom-block.info .custom-block-title {
        color: #1d4ed8;
      }
      .custom-block.tip {
        background: #eefbf3;
        border-color: #16a34a;
      }
      .custom-block.tip .custom-block-title {
        color: #15803d;
      }
      .custom-block.warning {
        background: #fff8e8;
        border-color: #d97706;
      }
      .custom-block.warning .custom-block-title {
        color: #b45309;
      }
      .custom-block.danger {
        background: #fff1f1;
        border-color: #dc2626;
      }
      .custom-block.danger .custom-block-title {
        color: #b91c1c;
      }
      .custom-block.details {
        padding: 0;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        background: #f8fafc;
      }
      .custom-block.details > summary {
        cursor: pointer;
        list-style: none;
        padding: 10px 14px;
        font-weight: 700;
        color: #334155;
      }
      .custom-block.details > summary::-webkit-details-marker {
        display: none;
      }
      .custom-block.details > *:not(summary) {
        padding: 0 14px 12px;
      }
      .custom-block.details > *:last-child {
        margin-bottom: 0;
      }
    </style>
  </head>
  <body>
    <!-- PREVIEW_HTML -->
    <!-- PREVIEW_RUNTIME -->
  </body>
</html>
